name: Initialize GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/enable_pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  actions: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update GitHub Pages site
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            core.info('Initializing GitHub Pages for dashboard deployment.');

            try {
              await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo });
              core.info('GitHub Pages site already exists.');
            } catch (error) {
              if (error.status !== 404) throw error;
              core.info('GitHub Pages site does not exist. Creating it with workflow build type.');
              await github.request('POST /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                build_type: 'workflow'
              });
            }

            try {
              await github.request('PUT /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                build_type: 'workflow'
              });
              core.info('GitHub Pages source set to GitHub Actions workflow.');
            } catch (error) {
              core.warning(`Could not update Pages build type: ${error.message}`);
            }

      - name: Trigger dashboard deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.request('POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy_pages.yml',
              ref: 'main'
            });
