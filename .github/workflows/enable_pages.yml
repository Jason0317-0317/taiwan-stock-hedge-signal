name: Initialize GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/enable_pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  actions: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update GitHub Pages site
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const source = { branch: 'gh-pages', path: '/' };
            core.info('Initializing GitHub Pages using gh-pages branch source.');

            try {
              await github.request('POST /repos/{owner}/{repo}/pages', { owner, repo, source });
              core.info('GitHub Pages site created with gh-pages branch source.');
            } catch (error) {
              if (![409, 422].includes(error.status)) throw error;
              core.info('GitHub Pages site already exists; updating source to gh-pages branch.');
              await github.request('PUT /repos/{owner}/{repo}/pages', { owner, repo, source });
            }

      - name: Trigger branch dashboard deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.request('POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy_gh_pages_branch.yml',
              ref: 'main'
            });
