name: Weekly Hedge Signal

on:
  schedule:
    - cron: '0 0 * * 1'  # 每週一 UTC 00:00 = 台灣時間週一 08:00
  workflow_dispatch:       # 也可以手動觸發

jobs:
  send-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance pandas numpy xgboost scikit-learn

      - name: Run signal and send email
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL:  ${{ secrets.RECEIVER_EMAIL }}
        run: python hedge_signal.py
