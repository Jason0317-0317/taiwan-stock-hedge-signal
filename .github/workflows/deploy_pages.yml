name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - public/**
      - .github/workflows/deploy_pages.yml
      - .github/workflows/enable_pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure GitHub Pages site exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo });
              core.info('GitHub Pages site already exists.');
            } catch (error) {
              if (error.status !== 404) throw error;
              core.info('Creating GitHub Pages site with workflow build type.');
              await github.request('POST /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                build_type: 'workflow'
              });
            }

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
